# CRITICAL: stdio MCP servers MUST NOT print anything to stdout except JSON-RPC.
# 1. Disable web server — we're a CLI app, not HTTP.
spring.main.web-application-type=none
# 2. Silence the Spring Boot banner (goes to stdout by default).
spring.main.banner-mode=off
# 3. Keep stdout clean: route all log output to stderr.
#    Logback's default console appender writes to System.out; we override to System.err.
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %logger{36} - %msg%n
logging.level.root=WARN
logging.level.com.jimmy.mcp=INFO
