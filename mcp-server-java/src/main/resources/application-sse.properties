# SSE Transport profile
# Run with: java -jar mcp-server-java.jar --spring.profiles.active=sse
#
# This profile overrides the base application.properties to:
#   1. Enable the embedded web server (override web-application-type=none)
#   2. Switch transport from stdio to SSE HTTP endpoints
#
# MCP client connects to:
#   GET  http://localhost:8080/sse       <- establishes SSE stream
#   POST http://localhost:8080/message   <- send JSON-RPC messages

spring.main.web-application-type=servlet
server.port=8080

mcp.server.transport=sse

# SSE mode logs to console normally (stdout is safe — no JSON-RPC on stdout)
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{20} - %msg%n
logging.level.root=INFO
logging.level.com.jimmy.mcp=DEBUG
