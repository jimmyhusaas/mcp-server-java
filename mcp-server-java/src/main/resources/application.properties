# CRITICAL: stdio MCP servers MUST NOT print anything to stdout except JSON-RPC.
# 1. Disable web server — we're a CLI app, not HTTP.
spring.main.web-application-type=none
# 2. Silence the Spring Boot banner (goes to stdout by default).
spring.main.banner-mode=off
# 3. Keep stdout clean: route all log output to stderr.
#    Logback's default console appender writes to System.out; we override to System.err.
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %logger{36} - %msg%n
logging.level.root=WARN
logging.level.com.jimmy.mcp=INFO

# MCP server identity — reported during the initialize handshake
mcp.server.name=mcp-server-java
mcp.server.version=0.1.0

# News RSS sources — add or replace to change which media outlets are searched.
# Results from all sources are aggregated and deduplicated automatically.
# Examples (uncomment to enable):
#   mcp.tools.news.rss-urls[1]=https://news.pts.org.tw/rss.xml      # 公視（最中立）
#   mcp.tools.news.rss-urls[2]=https://www.ttv.com.tw/rss/news.xml  # 台視
mcp.tools.news.rss-urls[0]=https://news.ltn.com.tw/rss/all.xml
